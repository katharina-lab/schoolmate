<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schoolmate — Never fill out a school form again</title>
  <meta name="description" content="Schoolmate monitors your inbox, understands school emails, and automatically fills out permission slips and forms — so you don't have to." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;0,800;0,900;1,700;1,800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; background: #fafafa; color: #0f172a; }
    input, select, button, textarea { font-family: 'DM Sans', sans-serif; }
    input:focus, select:focus, textarea:focus { border-color: #6366f1 !important; box-shadow: 0 0 0 3px rgba(99,102,241,0.12); outline: none; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes float { 0%,100% { transform: translateY(0px); } 50% { transform: translateY(-8px); } }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
    .fade-up { animation: fadeUp 0.6s cubic-bezier(0.22,1,0.36,1) forwards; }
    .float { animation: float 4s ease-in-out infinite; }
    .marquee-track { display: flex; animation: marquee 25s linear infinite; width: max-content; }
    .marquee-track:hover { animation-play-state: paused; }
    a { color: inherit; text-decoration: none; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const MOCK_ACTIVITY = [
      { id: 1, time: "Today, 09:14", type: "FILLED", title: "Field Trip Permission — London Zoo", detail: "Form filled and saved to Desktop", icon: "✓", color: "#22c55e" },
      { id: 2, time: "Today, 08:51", type: "SKIPPED", title: "School Newsletter — March Edition", detail: "Newsletter ignored as per preferences", icon: "—", color: "#94a3b8" },
      { id: 3, time: "Yesterday, 15:30", type: "NOTIFY", title: "Overnight Trip to Edinburgh", detail: "Needs your decision — overnight trips require approval", icon: "!", color: "#f59e0b" },
      { id: 4, time: "Yesterday, 11:02", type: "FILLED", title: "Sports Day Consent Form", detail: "Form filled with medical info and emergency contact", icon: "✓", color: "#22c55e" },
      { id: 5, time: "Mon, 09:45", type: "FILLED", title: "Swimming Permission Slip", detail: "Form filled — medical notes included", icon: "✓", color: "#22c55e" },
    ];

    const PLANS = [
      { name: "Free", price: "0", period: "forever", features: ["1 child profile", "Check emails every 2 hours", "Up to 10 forms/month", "Desktop PDF output"], cta: "Get started free", highlight: false },
      { name: "Pro", price: "5", period: "per month", features: ["Up to 3 child profiles", "Check emails every 15 min", "Unlimited forms", "Email notifications", "Priority support"], cta: "Start free trial", highlight: true },
      { name: "Family", price: "9", period: "per month", features: ["Unlimited child profiles", "Real-time monitoring", "Unlimited forms", "SMS notifications", "Multiple schools"], cta: "Start free trial", highlight: false },
    ];

    const TESTIMONIALS = [
      { name: "Sarah M.", role: "Mum of 2 · London", avatar: "S", color: "#6366f1", quote: "I used to spend every Sunday evening filling out school forms. Schoolmate handles everything automatically now. I didn't even know about half the trips until they were already approved!", stars: 5 },
      { name: "Thomas K.", role: "Dad of 3 · Munich", avatar: "T", color: "#8b5cf6", quote: "The preference settings are genius. I told it to always approve sports and field trips but ask me for overnight trips. It just works. Hasn't made a single mistake in 3 months.", stars: 5 },
      { name: "Emma R.", role: "Single mum · Manchester", avatar: "E", color: "#ec4899", quote: "As a single parent I'm always juggling a million things. Schoolmate saves me at least an hour a week. The best €5 I spend every month, honestly.", stars: 5 },
      { name: "David L.", role: "Dad of 1 · Berlin", avatar: "D", color: "#22c55e", quote: "My daughter's school sends so many emails. I was always missing things. Now Schoolmate catches everything and I just find the filled forms ready to print on my desktop.", stars: 5 },
      { name: "Julia W.", role: "Mum of 4 · Vienna", avatar: "J", color: "#f59e0b", quote: "Four kids means four times the school admin. Schoolmate handles all of them. I can't imagine going back to doing this manually. It's a lifesaver.", stars: 5 },
      { name: "Mark T.", role: "Dad of 2 · Dublin", avatar: "M", color: "#14b8a6", quote: "Set it up in 10 minutes, hasn't needed my attention since. It even caught a school trip I would have definitely missed and had the form ready before I even knew about it.", stars: 5 },
    ];

    const FAQS = [
      { q: "Is my email data safe?", a: "Absolutely. Your email password is encrypted end-to-end and never stored in plain text. Schoolmate only reads emails that match school-related keywords — it never touches your personal emails." },
      { q: "Which email providers are supported?", a: "Schoolmate works with any IMAP-compatible email provider: Gmail, Outlook, Apple Mail, Strato, GMX, Web.de, T-Online, and many more." },
      { q: "What happens if Schoolmate makes a mistake?", a: "Schoolmate never sends emails on your behalf — it only fills out and saves PDF forms to your Desktop. You always review and print them yourself, so you stay in control." },
      { q: "Can I use it for multiple children?", a: "Yes! The Pro plan supports up to 3 child profiles, and the Family plan supports unlimited children across multiple schools." },
      { q: "What languages does it support?", a: "Schoolmate understands emails in English, German, French, Spanish, and Italian. More languages are being added regularly." },
      { q: "Can I cancel anytime?", a: "Yes, no questions asked. Cancel anytime from your dashboard and you won't be charged again. Your data is deleted within 30 days of cancellation." },
      { q: "Does it work with all schools?", a: "Yes — Schoolmate works with any school that sends emails. It doesn't need any special integration with your school's systems." },
      { q: "How does the free plan work?", a: "The free plan is genuinely free forever. You get 1 child profile, email checks every 2 hours, and up to 10 forms per month. No credit card needed to sign up." },
    ];

    const Logo = ({ size = 22, white = false }) => (
      <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
        <div style={{ width: size + 10, height: size + 10, background: white ? "rgba(255,255,255,0.2)" : "linear-gradient(135deg, #6366f1, #8b5cf6)", borderRadius: "10px", display: "flex", alignItems: "center", justifyContent: "center", fontSize: size * 0.7, color: "white", fontWeight: 700 }}>S</div>
        <span style={{ fontSize: size, fontFamily: "'Fraunces', serif", fontWeight: 800, color: white ? "white" : "#0f172a", letterSpacing: "-0.5px" }}>
          School<span style={{ color: white ? "rgba(255,255,255,0.7)" : "#6366f1" }}>mate</span>
        </span>
      </div>
    );

    const Badge = ({ children, color = "#6366f1" }) => (
      <span style={{ background: `${color}18`, color, fontSize: "11px", fontWeight: 600, padding: "4px 12px", borderRadius: "999px", letterSpacing: "0.3px" }}>{children}</span>
    );

    const Stars = ({ n = 5 }) => (
      <div style={{ display: "flex", gap: "2px" }}>
        {[...Array(n)].map((_, i) => <span key={i} style={{ color: "#f59e0b", fontSize: "14px" }}>★</span>)}
      </div>
    );

    const inputStyle = { width: "100%", padding: "11px 14px", border: "1px solid #e2e8f0", borderRadius: "10px", fontSize: "14px", color: "#0f172a", background: "white", transition: "border-color 0.15s" };
    const labelStyle = { fontSize: "12px", fontWeight: 600, color: "#64748b", letterSpacing: "0.3px", textTransform: "uppercase", marginBottom: "6px", display: "block" };

    const Toggle = ({ checked, onChange }) => (
      <div onClick={() => onChange(!checked)} style={{ width: "42px", height: "24px", background: checked ? "#6366f1" : "#e2e8f0", borderRadius: "999px", cursor: "pointer", position: "relative", transition: "background 0.2s", flexShrink: 0 }}>
        <div style={{ position: "absolute", top: "3px", left: checked ? "21px" : "3px", width: "18px", height: "18px", background: "white", borderRadius: "50%", transition: "left 0.2s", boxShadow: "0 1px 4px rgba(0,0,0,0.15)" }} />
      </div>
    );

    const FaqItem = ({ q, a }) => {
      const [open, setOpen] = useState(false);
      return (
        <div style={{ borderBottom: "1px solid #f1f5f9" }}>
          <button onClick={() => setOpen(!open)} style={{ width: "100%", display: "flex", alignItems: "center", justifyContent: "space-between", padding: "18px 0", background: "none", border: "none", cursor: "pointer", textAlign: "left", gap: "16px" }}>
            <span style={{ fontSize: "15px", fontWeight: 600, color: "#0f172a" }}>{q}</span>
            <span style={{ fontSize: "20px", color: "#6366f1", flexShrink: 0, transition: "transform 0.2s", transform: open ? "rotate(45deg)" : "none" }}>+</span>
          </button>
          {open && <p style={{ fontSize: "14px", color: "#64748b", lineHeight: 1.7, paddingBottom: "18px" }}>{a}</p>}
        </div>
      );
    };

    const LandingPage = ({ onSignup }) => {
      const [mounted, setMounted] = useState(false);
      const [email, setEmail] = useState("");
      const [submitted, setSubmitted] = useState(false);
      const [scrolled, setScrolled] = useState(false);

      useEffect(() => {
        setTimeout(() => setMounted(true), 50);
        const handleScroll = () => setScrolled(window.scrollY > 20);
        window.addEventListener("scroll", handleScroll);
        return () => window.removeEventListener("scroll", handleScroll);
      }, []);

      return (
        <div style={{ minHeight: "100vh", background: "#fafafa" }}>

          {/* Sticky Nav */}
          <nav style={{ position: "sticky", top: 0, zIndex: 100, background: scrolled ? "rgba(250,250,250,0.95)" : "transparent", backdropFilter: "blur(12px)", borderBottom: scrolled ? "1px solid rgba(0,0,0,0.06)" : "none", padding: "0 40px", height: "62px", display: "flex", alignItems: "center", justifyContent: "space-between", transition: "all 0.3s" }}>
            <Logo />
            <div style={{ display: "flex", alignItems: "center", gap: "28px" }}>
              <a href="#how" style={{ fontSize: "14px", color: "#64748b", fontWeight: 500 }}>How it works</a>
              <a href="#pricing" style={{ fontSize: "14px", color: "#64748b", fontWeight: 500 }}>Pricing</a>
              <a href="#faq" style={{ fontSize: "14px", color: "#64748b", fontWeight: 500 }}>FAQ</a>
              <button onClick={onSignup} style={{ background: "none", border: "none", fontSize: "14px", color: "#64748b", cursor: "pointer", fontWeight: 500 }}>Log in</button>
              <button onClick={onSignup} style={{ background: "#6366f1", color: "white", border: "none", padding: "9px 20px", borderRadius: "10px", fontSize: "13px", fontWeight: 600, cursor: "pointer", boxShadow: "0 2px 8px rgba(99,102,241,0.3)" }}>Get started free</button>
            </div>
          </nav>

          {/* Hero */}
          <div style={{ maxWidth: "960px", margin: "0 auto", padding: "80px 40px 60px", textAlign: "center", opacity: mounted ? 1 : 0, transform: mounted ? "none" : "translateY(24px)", transition: "all 0.7s cubic-bezier(0.22,1,0.36,1)" }}>
            <div style={{ marginBottom: "20px", display: "flex", gap: "8px", justifyContent: "center", flexWrap: "wrap" }}>
              <Badge>AI-powered school admin</Badge>
              <Badge color="#22c55e">Free to start</Badge>
            </div>
            <h1 style={{ fontFamily: "'Fraunces', serif", fontSize: "clamp(44px, 6vw, 72px)", fontWeight: 900, color: "#0f172a", lineHeight: 1.05, letterSpacing: "-2.5px", marginBottom: "24px" }}>
              Never fill out a<br />
              <span style={{ background: "linear-gradient(135deg, #6366f1, #8b5cf6)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>school form again.</span>
            </h1>
            <p style={{ fontSize: "19px", color: "#64748b", lineHeight: 1.7, maxWidth: "580px", margin: "0 auto 40px" }}>
              Schoolmate monitors your inbox, understands school emails, and automatically fills out permission slips — so you can actually enjoy your evenings.
            </p>

            {/* Email capture */}
            {!submitted ? (
              <div style={{ display: "flex", gap: "10px", justifyContent: "center", maxWidth: "440px", margin: "0 auto 16px" }}>
                <input value={email} onChange={e => setEmail(e.target.value)} placeholder="Enter your email" style={{ ...inputStyle, flex: 1, padding: "13px 16px", borderRadius: "12px", fontSize: "15px" }} />
                <button onClick={() => { if (email) { setSubmitted(true); setTimeout(onSignup, 800); } }} style={{ background: "linear-gradient(135deg, #6366f1, #8b5cf6)", color: "white", border: "none", padding: "13px 24px", borderRadius: "12px", fontSize: "14px", fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap", boxShadow: "0 4px 16px rgba(99,102,241,0.35)" }}>
                  {submitted ? "✓ See you soon!" : "Get started free"}
                </button>
              </div>
            ) : (
              <div style={{ fontSize: "15px", color: "#22c55e", fontWeight: 600, marginBottom: "16px" }}>✓ You're on the list! Setting up your account...</div>
            )}
            <p style={{ fontSize: "13px", color: "#94a3b8" }}>No credit card required · Free forever · Setup in 10 minutes</p>

            {/* Social proof bar */}
            <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: "20px", marginTop: "40px", flexWrap: "wrap" }}>
              <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
                <div style={{ display: "flex" }}>
                  {["#6366f1","#8b5cf6","#ec4899","#22c55e","#f59e0b"].map((c, i) => (
                    <div key={i} style={{ width: "28px", height: "28px", borderRadius: "50%", background: `${c}30`, border: `2px solid ${c}`, marginLeft: i > 0 ? "-8px" : 0, display: "flex", alignItems: "center", justifyContent: "center", fontSize: "11px", fontWeight: 700, color: c }}>
                      {["S","T","E","D","J"][i]}
                    </div>
                  ))}
                </div>
                <span style={{ fontSize: "13px", color: "#64748b" }}><strong style={{ color: "#0f172a" }}>2,400+</strong> parents saving time</span>
              </div>
              <div style={{ width: "1px", height: "20px", background: "#e2e8f0" }} />
              <div style={{ display: "flex", alignItems: "center", gap: "6px" }}>
                <Stars />
                <span style={{ fontSize: "13px", color: "#64748b" }}><strong style={{ color: "#0f172a" }}>4.9/5</strong> average rating</span>
              </div>
              <div style={{ width: "1px", height: "20px", background: "#e2e8f0" }} />
              <div style={{ fontSize: "13px", color: "#64748b" }}>
                <strong style={{ color: "#0f172a" }}>1 hour/week</strong> saved per family
              </div>
            </div>
          </div>

          {/* Live demo card */}
          <div style={{ maxWidth: "700px", margin: "0 auto", padding: "0 40px 80px" }}>
            <div className="float" style={{ background: "white", border: "1px solid rgba(0,0,0,0.08)", borderRadius: "24px", padding: "24px", boxShadow: "0 20px 60px rgba(0,0,0,0.1)" }}>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: "16px" }}>
                <div style={{ fontSize: "13px", fontWeight: 600, color: "#0f172a" }}>Schoolmate is working...</div>
                <div style={{ display: "flex", alignItems: "center", gap: "6px" }}>
                  <div style={{ width: "7px", height: "7px", borderRadius: "50%", background: "#22c55e", animation: "pulse 2s infinite" }} />
                  <span style={{ fontSize: "11px", color: "#22c55e", fontWeight: 600 }}>LIVE</span>
                </div>
              </div>
              {MOCK_ACTIVITY.slice(0, 3).map((item, i) => (
                <div key={i} style={{ display: "flex", alignItems: "center", gap: "12px", padding: "10px 12px", background: "#f8fafc", borderRadius: "12px", marginBottom: "8px" }}>
                  <div style={{ width: "30px", height: "30px", borderRadius: "8px", background: `${item.color}18`, color: item.color, display: "flex", alignItems: "center", justifyContent: "center", fontSize: "13px", fontWeight: 700, flexShrink: 0 }}>{item.icon}</div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: "13px", fontWeight: 500, color: "#0f172a" }}>{item.title}</div>
                    <div style={{ fontSize: "11px", color: "#94a3b8", marginTop: "1px" }}>{item.detail}</div>
                  </div>
                  <span style={{ fontSize: "10px", background: `${item.color}18`, color: item.color, padding: "3px 8px", borderRadius: "999px", fontWeight: 600, flexShrink: 0 }}>{item.type}</span>
                </div>
              ))}
            </div>
          </div>

          {/* Marquee logos */}
          <div style={{ overflow: "hidden", padding: "24px 0", borderTop: "1px solid #f1f5f9", borderBottom: "1px solid #f1f5f9", background: "white", marginBottom: "80px" }}>
            <div style={{ fontSize: "12px", color: "#94a3b8", textAlign: "center", marginBottom: "16px", letterSpacing: "1px", textTransform: "uppercase", fontWeight: 500 }}>Works with all email providers</div>
            <div style={{ overflow: "hidden" }}>
              <div className="marquee-track">
                {["Gmail", "Outlook", "Apple Mail", "Strato", "GMX", "Web.de", "T-Online", "Yahoo Mail", "Hotmail", "ProtonMail", "Gmail", "Outlook", "Apple Mail", "Strato", "GMX", "Web.de", "T-Online", "Yahoo Mail", "Hotmail", "ProtonMail"].map((p, i) => (
                  <div key={i} style={{ padding: "8px 28px", margin: "0 8px", background: "#f8fafc", border: "1px solid #e2e8f0", borderRadius: "999px", fontSize: "13px", fontWeight: 500, color: "#64748b", whiteSpace: "nowrap" }}>{p}</div>
                ))}
              </div>
            </div>
          </div>

          {/* How it works */}
          <div id="how" style={{ maxWidth: "960px", margin: "0 auto", padding: "0 40px 80px" }}>
            <div style={{ textAlign: "center", marginBottom: "56px" }}>
              <Badge color="#6366f1">How it works</Badge>
              <h2 style={{ fontFamily: "'Fraunces', serif", fontSize: "40px", fontWeight: 800, color: "#0f172a", letterSpacing: "-1.5px", marginTop: "12px" }}>Three steps. Zero effort.</h2>
              <p style={{ fontSize: "16px", color: "#64748b", marginTop: "10px" }}>Set it up once, and Schoolmate handles everything from there.</p>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: "24px" }}>
              {[
                { step: "01", icon: "📧", title: "Connect your email", desc: "Securely link your inbox in under 2 minutes. Schoolmate only reads emails that look like they're from school — nothing else is ever touched.", color: "#6366f1" },
                { step: "02", icon: "⚙️", title: "Set your preferences", desc: "Tell Schoolmate your rules just once. Always allow field trips, never order school photos, ask me about overnight trips. It remembers everything.", color: "#8b5cf6" },
                { step: "03", icon: "✅", title: "Relax", desc: "Schoolmate runs quietly in the background. When a school email arrives, it reads it, decides what to do, and saves the filled form to your Desktop.", color: "#22c55e" },
              ].map((s, i) => (
                <div key={i} style={{ background: "white", border: "1px solid rgba(0,0,0,0.07)", borderRadius: "24px", padding: "32px", boxShadow: "0 2px 16px rgba(0,0,0,0.05)", position: "relative", overflow: "hidden" }}>
                  <div style={{ position: "absolute", top: "20px", right: "20px", fontFamily: "'Fraunces', serif", fontSize: "52px", fontWeight: 900, color: "#f1f5f9", lineHeight: 1 }}>{s.step}</div>
                  <div style={{ fontSize: "32px", marginBottom: "16px" }}>{s.icon}</div>
                  <div style={{ fontSize: "17px", fontWeight: 700, color: "#0f172a", marginBottom: "10px" }}>{s.title}</div>
                  <div style={{ fontSize: "14px", color: "#64748b", lineHeight: 1.7 }}>{s.desc}</div>
                  <div style={{ marginTop: "20px", height: "3px", background: `linear-gradient(90deg, ${s.color}, ${s.color}40)`, borderRadius: "999px" }} />
                </div>
              ))}
            </div>
          </div>

          {/* Features grid */}
          <div style={{ background: "white", borderTop: "1px solid #f1f5f9", borderBottom: "1px solid #f1f5f9", padding: "80px 40px" }}>
            <div style={{ maxWidth: "960px", margin: "0 auto" }}>
              <div style={{ textAlign: "center", marginBottom: "56px" }}>
                <Badge color="#8b5cf6">Features</Badge>
                <h2 style={{ fontFamily: "'Fraunces', serif", fontSize: "40px", fontWeight: 800, color: "#0f172a", letterSpacing: "-1.5px", marginTop: "12px" }}>Everything you need</h2>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: "20px" }}>
                {[
                  { icon: "🤖", title: "AI-powered understanding", desc: "Claude AI reads and understands school emails in any language, context, and format." },
                  { icon: "📋", title: "Automatic PDF filling", desc: "Forms are filled out with your child's details and saved to your Desktop, ready to print." },
                  { icon: "🔔", title: "Smart notifications", desc: "Get notified when something needs your attention — and only then." },
                  { icon: "👨‍👩‍👧‍👦", title: "Multiple children", desc: "Manage all your children's school admin from one place, across different schools." },
                  { icon: "🔒", title: "Privacy first", desc: "Your data is encrypted end-to-end. We never read your personal emails. GDPR compliant." },
                  { icon: "⚡", title: "Works in real-time", desc: "Pro users get email checks every 15 minutes so you never miss a deadline." },
                  { icon: "🌍", title: "Any email provider", desc: "Works with Gmail, Outlook, Apple Mail, Strato, GMX, and any IMAP provider." },
                  { icon: "🎯", title: "Custom preferences", desc: "Set your exact rules once — Schoolmate follows them perfectly every time." },
                  { icon: "📊", title: "Activity dashboard", desc: "See exactly what Schoolmate has done, what it filled, what it skipped, and why." },
                ].map((f, i) => (
                  <div key={i} style={{ padding: "24px", background: "#fafafa", border: "1px solid #f1f5f9", borderRadius: "16px", transition: "all 0.2s" }}>
                    <div style={{ fontSize: "28px", marginBottom: "12px" }}>{f.icon}</div>
                    <div style={{ fontSize: "15px", fontWeight: 600, color: "#0f172a", marginBottom: "8px" }}>{f.title}</div>
                    <div style={{ fontSize: "13px", color: "#64748b", lineHeight: 1.6 }}>{f.desc}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* Testimonials */}
          <div style={{ padding: "80px 40px", background: "#fafafa" }}>
            <div style={{ maxWidth: "960px", margin: "0 auto" }}>
              <div style={{ textAlign: "center", marginBottom: "56px" }}>
                <Badge color="#ec4899">Testimonials</Badge>
                <h2 style={{ fontFamily: "'Fraunces', serif", fontSize: "40px", fontWeight: 800, color: "#0f172a", letterSpacing: "-1.5px", marginTop: "12px" }}>Parents love it</h2>
